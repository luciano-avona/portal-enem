<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav>
            <a href="painel.html">Painel Principal</a>
            <a href="cursos.html">Verificação de Cursos</a>
            <a href="inscricao.html">Inscrição</a>
            <a href="login.html">Sair</a>
        </nav>
    </header>

    <main>

        <div class="formulario">

            <h2>Inscrição</h2>

            <select id="lingua">
                <option value="">Língua</option>
                <option>Inglês</option>
                <option>Espanhol</option>
            </select>

            <br><br>

            <select id="estado">
                <option value="">Estado</option>
                <option>SP</option>
                <option>RJ</option>
                <option>MG</option>
            </select>

            <br><br>

            <select id="cidade">
                <option value="">Cidade</option>
                <option>São Paulo</option>
                <option>Campinas</option>
                <option>Santos</option>
            </select>

            <br><br>

            <label>
                Necessita atendimento especializado?
            </label>

            <br>

            <input type="radio" name="especial" value="sim"> Sim
            <input type="radio" name="especial" value="nao"> Não

            <br><br>

            <div id="campoExtra" style="display:none;">
                <input type="text" id="necessidade" placeholder="Descreva a necessidade">
            </div>

            <br>

            <button id="btn">
                Confirmar Inscrição
            </button>

            <p id="mensagem"></p>

        </div>

    </main>

    <footer>
        Portal ENEM
    </footer>

    <script src="inscricao.js"></script>

</body>

</html>
